<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect x="2" y="2" width="60" height="60" fill="#FFF8F0" stroke="#1a1a2e" stroke-width="4" rx="4"/>
