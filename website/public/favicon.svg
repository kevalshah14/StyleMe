  <path d="M32 19 L32 24 L14 36 M32 24 L50 36" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Hanger bar -->
  <line x1="14" y1="36" x2="50" y2="36" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hanging shapes -->
  <!-- Square (pink/accent) -->
  <rect x="17" y="40" width="8" height="8" fill="#FF3B6F" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Circle (yellow) -->
  <circle cx="32" cy="44" r="4.5" fill="#FFD43B" stroke="#1a1a2e" stroke-width="2"/>
