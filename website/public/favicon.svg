  <polygon points="43,48 47,40 39,40" fill="#5B6EFF" stroke="#1a1a2e" stroke-width="2" stroke-linejoin="round"/>
  <!-- Strings -->
  <line x1="21" y1="36" x2="21" y2="40" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="32" y1="36" x2="32" y2="39.5" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="43" y1="36" x2="43" y2="40" stroke="#1a1a2e" stroke-width="1.5"/>
</svg>
